name: Daily community digest

on:
  schedule:
    # 01:00 UTC = 08:00 ICT (Vietnam) — early enough to be the morning post
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Run daily-digest script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/focus-camp
            docker compose exec -T app npx tsx scripts/daily-digest.ts
