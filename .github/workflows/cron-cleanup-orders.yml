name: Cleanup expired orders

on:
  schedule:
    # 03:00 UTC = 10:00 ICT (Vietnam) — after digest (01:00) and expiring emails (02:00)
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup endpoint
        run: |
          curl -fsS -X POST https://focus.camp/api/cron/cleanup-expired-orders \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
