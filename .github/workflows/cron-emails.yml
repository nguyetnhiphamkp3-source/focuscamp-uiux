name: Daily expiring emails

on:
  schedule:
    # 02:00 UTC = 09:00 ICT (Vietnam)
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Run expiring email script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/focus-camp
            docker compose exec -T app npx tsx scripts/send-expiring-emails.ts
