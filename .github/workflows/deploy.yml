name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/focus-camp/app
            git fetch origin main
            git checkout main
            git clean -fd -- scripts/migrate-challenge.ts scripts/migration-data/
            git pull origin main --ff-only

            # Ensure REDIS_URL is in .env
            grep -q "REDIS_URL" .env 2>/dev/null || echo 'REDIS_URL=redis://redis:6379' >> .env

            # Copy docker-compose.yml to parent dir (where VPS runs compose from)
            cp -f docker-compose.yml /opt/focus-camp/docker-compose.yml

            cd /opt/focus-camp
            echo "=== Pulling new image ==="
            docker compose pull app
            echo "=== Starting all services ==="
            docker compose up -d
            echo "=== Waiting for app to be ready ==="
            for i in $(seq 1 20); do
              if docker compose exec -T app wget -q -O /dev/null http://localhost:3000/api/health 2>/dev/null; then
                echo "App is ready after ${i}s"
                break
              fi
              sleep 2
            done

            echo "=== Syncing database schema ==="
            docker compose exec -T app npx prisma@6.19.3 db push --skip-generate || echo "db push failed (check schema)"

            echo "=== Grandfathering pre-launch communities (idempotent) ==="
            docker compose exec -T app node -e "
              const { PrismaClient } = require('@prisma/client');
              const prisma = new PrismaClient();
              (async () => {
                const cutoff = new Date('2026-04-29T00:00:00Z');
                const r = await prisma.community.updateMany({
                  where: {
                    planTier: 'SOLO',
                    planExpiresAt: null,
                    createdAt: { lt: cutoff }
                  },
                  data: { planTier: 'GRANDFATHER' }
                });
                console.log('Grandfathered communities:', r.count);
                await prisma.\$disconnect();
              })().catch(e => { console.error(e); process.exit(1); });
            " || echo "grandfather script failed (check logs)"

            echo "=== Pruning old images ==="
            docker image prune -f
            echo "=== Deploy complete ==="
            docker compose ps
