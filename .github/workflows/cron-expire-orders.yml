name: Daily expire stale orders

# Marks orders PENDING longer than 14 days as EXPIRED so the "Chờ thanh toán"
# list and member counts stay clean. Run as a direct SQL UPDATE against the db
# container because the production app image (Next.js standalone) does not bundle
# scripts/, so `npx tsx scripts/...` is not available there.

on:
  schedule:
    # 01:00 UTC = 08:00 ICT (Vietnam)
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Expire stale pending orders on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/focus-camp
            docker compose exec -T db psql -U focuscamp -d focuscamp -c "UPDATE \"Payment\" SET status='EXPIRED' WHERE status='PENDING' AND \"createdAt\" < now() - interval '14 days';"
