services:
  app:
    image: ghcr.io/mdm/focus-camp:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - SEED_OWNER_EMAIL=${SEED_OWNER_EMAIL}
      - SEPAY_WEBHOOK_API_KEY=${SEPAY_WEBHOOK_API_KEY}
      - SEPAY_BANK_CODE=${SEPAY_BANK_CODE}
      - SEPAY_BANK_ACCOUNT=${SEPAY_BANK_ACCOUNT}
      - SEPAY_BANK_NAME=${SEPAY_BANK_NAME}
      - SEPAY_BANK_HOLDER=${SEPAY_BANK_HOLDER}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: focuscamp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-focuscamp_dev_2026}
      POSTGRES_DB: focuscamp
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focuscamp"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

volumes:
  pgdata:
  redisdata:
